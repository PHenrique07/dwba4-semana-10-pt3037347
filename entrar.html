    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div style="display: flex;">
            <a href="index.html">HOME</a>
            <a href="eventos.html">EVENTOS</a>
            <a href="contato.html">CONTATO</a>
            <div class="dropdown">
                <button class="dropbtn">CURSOS</button>
                <div class="dropdown-content">

    <header class="cabecalho_principal">
        <img src="img/Logo.jpg" alt="Instituto Federal São Paulo">
    </header>

    <main class="container d-flex flex-column align-items-center justify-content-center my-5">
        <div class="text-center" style="width: 100%; max-width: 330px;">
            
            <img class="mb-4" src="img/ifsp.png" alt="Logo IFSP" width="72" height="72">
            
            <h1 class="h4 mb-4 fw-normal">Faça login</h1>

            <form>
                <div class="mb-2">
                    <input type="email" class="form-control" placeholder="Seu email" required autofocus>
                </div>
                
                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Senha" required>
                </div>

                <div class="form-check d-flex justify-content-center mb-3">
                    <input class="form-check-input me-2" type="checkbox" value="remember-me" id="lembrarMim">
                    <label class="form-check-label" for="lembrarMim">
                        Lembrar de mim
                    </label>
                </div>

                <div class="mb-3">
                    <a href="#" class="text-decoration-none">Esqueci a senha</a>
                </div>

                <button class="w-100 btn btn-primary" type="submit">Login</button>
                
                <p class="mt-5 mb-3 text-muted">&copy; 2026</p>
            </form>
            
        </div>
    </main>

    <br><br><br>
